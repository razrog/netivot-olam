<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>נתיבות עולם — ניהול</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&family=Frank+Ruhl+Libre:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      #admin { max-width: 960px; margin: 0 auto; padding: 16px; }
      .toolbar {
        position: sticky; top: 0; z-index: 5; display: flex; gap: 12px; align-items: center;
        background: var(--bg); padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 12px;
      }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th, td { text-align: right; padding: 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
      th { color: var(--muted); font-weight: 500; }
      td input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font: inherit; text-align: right; }
      td input.dirty { border-color: var(--gold); background: #fffaf0; }
      td.actions { white-space: nowrap; }
      .ok { color: var(--ok, #0f6e56); font-size: 13px; }
      .btn:disabled { opacity: .5; cursor: default; }
    </style>
  </head>
  <body>
    <div id="admin">
      <header class="topbar" style="border-radius:12px; margin-bottom:12px;">
        <div class="brand"><img src="/pic/logo.png" alt="נתיבות עולם" class="brand-logo" /></div>
        <div class="nav-user"><a href="/" class="link-light">→ חזרה לספרייה</a></div>
      </header>

      <div class="toolbar">
        <button id="save-all" class="btn">שמור שינויים</button>
        <button id="reindex" class="btn-ghost">סריקת אחסון לקבצים חדשים</button>
        <span id="status" class="ok"></span>
      </div>

      <table>
        <thead>
          <tr><th>כותרת</th><th>רב</th><th>פרשה</th><th>תאריך</th><th></th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <script src="/admin.js"></script>
  </body>
</html>
